<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Elliptical Shapes</title>
    <style>
        body {
            background: #f9f6f0;
            padding: 30px;
        }
        p {
            width: 150px;
            height: 150px;
            border: 3px solid #ff1493;
            margin: 30px;
            display: inline-block;
            background: transparent;
        }
        /* Sudut atas kiri lonjong */
        p.one {
            border-top-left-radius: 80px 50px;
            -moz-border-radius-topleft: 80px 50px;
            -webkit-border-top-left-radius: 80px 50px;
        }
        /* Semua sudut bentuk lonjong tidak sama */
        p.two {
            border-radius: 1em 4em 1em 4em / 2em 1em 2em 1em;
            -moz-border-radius: 1em 4em 1em 4em / 2em 1em 2em 1em;
            -webkit-border-radius: 1em 4em 1em 4em / 2em 1em 2em 1em;
        }
        /* Lingkaran sempurna */
        p.three {
            padding: 0px;
            border-radius: 100px;
            -moz-border-radius: 100px;
            -webkit-border-radius: 100px;
        }
    </style>
</head>
<body>
    <p class="one"></p>
    <p class="two"></p>
    <p class="three"></p>
</body>
</html>
