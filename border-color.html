<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Border Color Example</title>
    <style>
        p {
            padding: 15px;
            width: 600px;
            border-width: 6px;
            border-style: solid;
            margin: 20px 0;
            font-size: 28px;
        }
        p.one {
            border-color: #0088dd;
        }
        p.two {
            border-color: #0088dd #111111 #ee3e80 #bbbbaa;
        }
    </style>
</head>
<body>
    <p class="one">The ARP Odyssey was introduced in 1972.</p>
    <p class="two">The ARP Odyssey was introduced in 1972.</p>
</body>
</html>
