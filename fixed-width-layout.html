<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Layout</title>
    <style>
        body {
            width: 960px;
            margin: 0 auto;
            font-family: serif;
        }
        #header h1 {
            text-align: center;
            font-size: 2em;
            margin: 15px 0;
        }
        #nav {
            background-color: #efefef;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }
        #nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #nav li {
            display: inline;
            padding: 0 5px;
        }
        #nav a {
            color: #000;
        }
        #feature {
            background-color: #efefef;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }
        #content {
            overflow: auto;
            height: 100%;
        }
        .column1, .column2, .column3 {
            background-color: #efefef;
            width: 300px;
            float: left;
            margin: 10px;
            padding: 10px 0;
        }
        #footer {
            background-color: #efefef;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Logo</h1>
        <div id="nav">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Products</a></li>
                <li><a href="">Services</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </div>
    </div>
    <div id="content">
        <div id="feature">
            <p>Feature</p>
        </div>
        <div class="article column1">
            <p>Column One</p>
        </div>
        <div class="article column2">
            <p>Column Two</p>
        </div>
        <div class="article column3">
            <p>Column Three</p>
        </div>
    </div>
    <div id="footer">
        <p>&copy; Copyright 2011</p>
    </div>
</body>
</html>
