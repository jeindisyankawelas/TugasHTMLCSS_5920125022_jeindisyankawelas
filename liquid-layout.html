<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Layout</title>
    <style>
        body {
            width: 90%;
            margin: 0 auto;
            font-family: serif;
        }
        #content {
            overflow: auto;
        }
        #nav, #feature, #footer {
            margin: 1%;
        }
        .column1, .column2, .column3 {
            width: 31.3%;
            float: left;
            margin: 1%;
        }
        .column3 {
            margin-right: 0%;
        }
        li {
            display: inline;
            padding: 0.5em;
        }
        #nav, #footer {
            background-color: #efefef;
            padding: 0.5em 0;
            text-align: center;
        }
        #feature, .article {
            height: 10em;
            margin-bottom: 1em;
            background-color: #efefef;
        }
        /* ✅ PERBAIKAN UTAMA: Teks di tengah kotak */
        .article p {
            text-align: center;  /* Rata tengah kiri-kanan */
            line-height: 10em;   /* Rata tengah atas-bawah (sama dengan tinggi kotak) */
            margin: 0;
        }
        #feature p {
            text-align: center;
            line-height: 10em;
            margin: 0;
        }
        #header h1 {
            text-align: center;
            font-size: 2em;
            margin: 20px 0;
        }
        #nav a {
            color: #000;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Logo</h1>
        <div id="nav">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Products</a></li>
                <li><a href="">Services</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </div>
    </div>
    <div id="content">
        <div id="feature">
            <p>Feature</p>
        </div>
        <div class="article column1">
            <p>Column One</p>
        </div>
        <div class="article column2">
            <p>Column Two</p>
        </div>
        <div class="article column3">
            <p>Column Three</p>
        </div>
    </div>
    <div id="footer">
        <p> &copy ; Copyright 2011</p>
    </div>
</body>
</html>
