<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Border Width Example</title>
    <style>
        p {
            border-style: solid;
            border-color: #000;
            padding: 10px;
            width: 400px;
            margin: 20px 0;
        }
        p.one {
            border-width: 2px;
        }
        p.two {
            border-width: thick;
        }
        p.three {
            border-width: 1px 4px 12px 4px;
            border-color: #000 #000 #000 #000;
        }
    </style>
</head>
<body>
    <p class="one">Hohner's "Clavinet" is essentially an electric clavichord.</p>
    <p class="two">Hohner's "Clavinet" is essentially an electric clavichord.</p>
    <p class="three">Hohner's "Clavinet" is essentially an electric clavichord.</p>
</body>
</html>
