<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Index of Translations</title>
    <style>
        body {
            font-family: serif;
            background: #f9f6f0;
            padding: 30px;
        }
        h1 {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 30px;
        }
        ul {
            list-style: none;
            padding-left: 20px;
        }
        li {
            font-size: 1.8em;
            margin: 10px 0;
        }
        li::before {
            content: "✦";
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <h1>Index of Translations</h1>
    <h2>Arthur Rimbaud</h2>
    <ul>
        <li>Ophelia</li>
        <li>To Music</li>
        <li>A Dream for Winter</li>
        <li>Vowels</li>
        <li>The Drunken Boat</li>
    </ul>
</body>
</html>
